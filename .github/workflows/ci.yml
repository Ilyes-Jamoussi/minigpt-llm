name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies (CPU torch keeps the job fast)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src api app.py

      - name: Pytest
        run: pytest
